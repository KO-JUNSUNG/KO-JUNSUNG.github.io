<line x1="500" y1="200" x2="500" y2="290" stroke="#378ADD" stroke-width="3" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(55, 138, 221);color:rgb(11, 11, 11);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
